name: RSS Bot Check

on:
  schedule:
    - cron: '0 */6 * * *'  # كل 6 ساعات
  workflow_dispatch:

jobs:
  check-feeds:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: استنساخ المستودع
      uses: actions/checkout@v4

    - name: إعداد Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: تثبيت المكتبات
      run: |
        pip install python-telegram-bot==21.3
        pip install feedparser==6.0.11
        pip install requests beautifulsoup4
        pip install trafilatura lxml

    - name: تشغيل البوت وفحص الخلاصات
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        USER_ID: ${{ secrets.USER_ID }}
        GITHUB_ACTIONS: true
      run: python bot.py
